name: Test EC2 Connection

on:
workflow_dispatch:

jobs:
test-ssh:
runs-on: ubuntu-latest

```
steps:
  - name: Test SSH Connection
    uses: appleboy/ssh-action@master
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ec2-user
      key: ${{ secrets.EC2_KEY }}
      port: 22
      script: |
        echo "Connected to EC2 successfully"
        whoami
        hostname
        pwd
```
