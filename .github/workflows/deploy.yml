name: Test EC2 Connection

on:
    push:
        branches:
            - main

jobs:
test:
runs-on: ubuntu-latest

steps:
  - name: Test SSH connection
    uses: appleboy/ssh-action@master
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ec2-user
      key: ${{ secrets.EC2_KEY }}
      port: 22
      script: |
        echo "Connected successfully"
        whoami
        hostname
