name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |
          ls
          cd pine_website
          git pull
          docker stop pine_website || true
          docker rm pine_website || true
          docker build -t pine_website .
          docker run -d -p 80:80 --name pine_website pine_website